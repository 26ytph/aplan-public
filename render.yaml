services:
  - type: web
    name: taipei-time-machine
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./test.db
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
